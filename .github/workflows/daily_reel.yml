name: Daily IG Reel

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pick next reel from assets folders
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          assets_dir = Path("assets")
          reels_file = Path("config/reels.json")
          posted_file = Path("config/posted_reels.json")

          reels = json.loads(reels_file.read_text(encoding="utf-8"))
          posted = set(json.loads(posted_file.read_text(encoding="utf-8")))

          reel_map = {item["slug"]: item for item in reels}

          available_slugs = sorted([
              p.name for p in assets_dir.iterdir()
              if p.is_dir()
          ])

          next_slug = ""
          for slug in available_slugs:
              if slug in reel_map and slug not in posted:
                  next_slug = slug
                  break

          Path("next_slug.txt").write_text(next_slug, encoding="utf-8")
          print("AVAILABLE_SLUGS =", available_slugs)
          print("NEXT_SLUG =", next_slug)
          PY

      - name: Build reel video
        run: |
          SLUG=$(cat next_slug.txt)
          if [ -n "$SLUG" ]; then
            python scripts/build_reel.py "$SLUG"
          else
            echo "No reel left to build."
          fi

      - name: Commit generated reel
        run: |
          SLUG=$(cat next_slug.txt)
          if [ -n "$SLUG" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add reels/generated/"$SLUG".mp4
            git commit -m "Add generated reel: $SLUG" || echo "Nothing to commit"
            git push
          fi

      - name: Wait for GitHub Pages
        run: sleep 60

      - name: Publish to Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          GITHUB_PAGES_BASE: https://mini16111985-hub.github.io/tmg-ig-reels
        run: |
          SLUG=$(cat next_slug.txt)
          if [ -n "$SLUG" ]; then
            python scripts/publish_instagram_reel.py
          else
            echo "No reel left to publish."
          fi

      - name: Commit updated posted list
        run: |
          SLUG=$(cat next_slug.txt)
          if [ -n "$SLUG" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add config/posted_reels.json
            git commit -m "Mark reel as posted" || echo "Nothing to commit"
            git push
          fi
